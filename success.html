<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — NexGrade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F8F7F2;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(26,43,74,0.12);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #ecfdf5;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #1A2B4A;
      margin-bottom: 0.75rem;
    }
    p {
      color: #5E6578;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background: #E8960F;
      color: #1A2B4A;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #F5AB35; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>
      Thanks for booking with NexGrade. You'll receive a confirmation
      email shortly with everything you need to get started.
      I'll be in touch within a few hours to lock in your session time.
    </p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
